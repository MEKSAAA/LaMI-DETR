tools:
  - name: lami_detr_grounder
    type: tool
    enabled: true
    description: "Generate candidate object boxes from text prompts."
    input_schema: {image: PIL.Image, prompt_info: dict, nms_iou: float, score_threshold: float, topk: int, backend: str}
    output_schema: {boxes: list, boxes_1000: "list|null", scores: list, class_name: str, image_size: list, backend: str}
    coordinate_contract: "internal pixel xyxy; optional bbox_1000 for Doubao compatibility"
    determinism: "deterministic if backend deterministic"
    timeout_s: 45
  - name: zoom_crop_tool
    type: tool
    enabled: true
    description: "Crop and enlarge ROI while preserving reversible coordinate mapping."
    input_schema: {image: PIL.Image, bbox_xyxy: list, padding_ratio: float, max_side: int}
    output_schema: {crop: PIL.Image, origin_xy: list, crop_width: int, crop_height: int, scale: float}
    coordinate_contract: "returns crop->full inverse map metadata"
    determinism: "deterministic"
    timeout_s: 5
  - name: code_visual_analyzer
    type: tool
    enabled: true
    description: "Template-based deterministic local reasoning (interior/grasp/free-space)."
    input_schema: {crop_image: PIL.Image, analysis_type: str, candidate_boxes: "list|null", crop_meta: "dict|null", full_image_size: "list|null"}
    output_schema: {points_normalized_crop: list, points_full_image: list, confidence: float, text: str, mask_debug: "any|null"}
    coordinate_contract: "crop normalized points plus optional projected full-image points"
    determinism: "deterministic templates"
    timeout_s: 15
  - name: web_search_tool
    type: tool
    enabled: true
    description: "Expand long-tail concepts into detector-friendly attributes/cues."
    input_schema: {queries: list}
    output_schema: {concepts: list, visual_cues: list, raw_search_results: "dict|null", backend: str, fallback_reason: "str|null"}
    coordinate_contract: "N/A"
    determinism: "non-deterministic when using live API"
    timeout_s: 30
